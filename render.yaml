# Render blueprint (source-controlled deploy).
#
# Builds a thin overlay image (deploy/render/Dockerfile) FROM the official,
# digest-pinned server image and bakes in deploy/render/server-config.yaml so
# the Modal managed-host config lives in git. The web UI ships in the base image
# (an overlay build, not a from-source build, so nothing is lost).
#
# Provisions: web service + managed Postgres + 10GB data disk.
# Auth: built-in `accounts` (multi-user, invite-only) — no IdP needed.
# Secrets (Modal tokens, optional OIDC) are declared here as sync:false and set
# in the Render dashboard; nothing secret is committed. See deploy/render/DEPLOY.md.

services:
  - type: web
    name: omnigent
    runtime: docker
    dockerfilePath: ./deploy/render/Dockerfile
    dockerContext: .
    plan: starter          # 512MB. Bump to `standard` (2GB) if the server OOM-loops.
    healthCheckPath: /health
    disk:
      name: artifact-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: omnigent-db
          property: connectionString
      - key: ARTIFACT_DIR
        value: /data/artifacts
      # Keep the first-boot admin password on the disk across redeploys.
      - key: OMNIGENT_ADMIN_CREDENTIALS_PATH
        value: /data/admin-credentials
      - key: HOST
        value: 0.0.0.0
      - key: OMNIGENT_AUTH_PROVIDER
        value: accounts
      - key: OMNIGENT_ACCOUNTS_AUTO_OPEN
        value: "0"
      # Modal provider credentials — the server reads these to provision managed
      # sandboxes. Secrets: set the values in the Render dashboard (not in git).
      # Get them from https://modal.com/settings/tokens (`modal token new`).
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      # No COOKIE_SECRET or BASE_URL here: the entrypoint mints a hex cookie
      # secret on the disk and auto-detects the public URL from RENDER_EXTERNAL_URL,
      # so this blueprint deploys with zero prompts.
      #
      # To use your own IdP instead of built-in accounts, set
      # OMNIGENT_AUTH_PROVIDER=oidc and add the OMNIGENT_OIDC_* vars (including
      # OMNIGENT_OIDC_COOKIE_SECRET = `openssl rand -hex 32`) here as sync:false.
      # See deploy/render/README.md.

databases:
  - name: omnigent-db
    plan: basic-256mb
    databaseName: omnigent
    user: omnigent
